<head>
  <meta charset="UTF-8">
  <title>3 رسائل</title>
  <style>
    .alert-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      justify-content: center;
      align-items: center
    }

    .alert-box {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      width: 260px;
      animation: pop 0.3s ease
    }

    .alert-box h2 {
      margin: 0 0 8px;
      color: #28a745
    }

    @keyframes pop {
      from {
        transform: scale(0.7);
        opacity: 0
      }

      to {
        transform: scale(1);
        opacity: 1
      }
    }
  </style>
</head>

<div class="alert-bg" id="alert">
  <div class="alert-box">
    <h2 id="alert-title"></h2>
  </div>
</div>

<script>

  function showAlert(title) {
    document.getElementById("alert-title").innerText = title;
    document.getElementById("alert").style.display = "flex";
    setTimeout(() => {
      document.getElementById("alert").style.display = "none";
    }, 2000);
  }

</script>
