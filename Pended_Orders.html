<!doctype html>
<html lang="ar">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>طب البسطاء</title>
  <link rel="stylesheet" href="/static/style2.css">
</head>

<body>

<button class="B_Home">في انتظار التأكيد</button>
<!-- Popup للـ Invoice_List -->
<div id="popup_invoices" class="popup" hidden="true">
  <div class="popup-content" role="dialog" aria-labelledby="title_invoices">
    <h3 id="title_invoices">قائمة الفواتير</h3>

    <input type="text" id="search_invoices" class="search-box" placeholder="ابحث عن رقم الفاتورة أو اسم العميل..." oninput="filterInvoiceList(this.value)">

    <div class="popup-list" id="list_invoices">
      <!-- سيتم ملؤه تلقائيًا بواسطة JS -->
    </div>

    <div id="no_invoices" class="no-results" style="display:none;">لا توجد نتائج</div>
  </div>
</div>
 

<bodyPrint id="Print_Area">

<label style="color:rgb(0, 0, 0);">فاتورة طلبات عميل طب البسطاء</label>

<!-- بيانات الفاتورة -->
<table>
  <thead>
    <tr>
      <th>رقم الفاتورة</th>
      <th>اسم العميل</th>
    </tr>
  </thead>
  <tbody id="invoiceInfo"></tbody>

  <thead>
    <tr>
      <th>عنوان التوصيل</th>
      <th>رقم الهاتف</th>
    </tr>
  </thead>
  <tbody id="clientInfo"></tbody>
</table>

<br>

<!-- الأصناف -->
<table>
  <thead>
    <tr>
      <th>الصنف</th>
      <th>الكمية</th>
      <th>السعر</th>
      <th>الإجمالي</th>
    </tr>
  </thead>
  <tbody id="itemsTable"></tbody>
</table>

<br>

<!-- الملخص -->
<table>
  <thead>
    <tr>
      <th>ثمن الأصناف</th>
      <th>التوصيل</th>
      <th>الخصم</th>
      <th>المطلوب</th>
    </tr>
  </thead>
  <tbody id="summaryTable"></tbody>
</table>

</bodyPrint>

<row>
  <button class="B_Any" style="width: 100%;  height:60px" onclick="Accepted()">✔️</button>
  <button class="B_Any" style="width: 100%; height:60px" onclick="Rejected()">❌</button>
  <button class="B_Any" style="width: 100%; height:60px" onclick="Open_Whatsapp()">💬</button>
  <button class="B_Any" style="width: 100%; color: rgb(25, 116, 235); height:60px" onclick="BackInvoice()">❯❯</button>
  <button class="B_Any" style="width: 100%;  height:60px" id="window.print">💾</button>


</row>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="FireBase.js"></script>
<script src="Pended_Orders_js.js"></script>



<head>
<meta charset="UTF-8">
<title>3 رسائل</title>
<style>
.alert-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);justify-content:center;align-items:center}
.alert-box{background:#fff;padding:20px;border-radius:10px;text-align:center;width:260px;animation:pop 0.3s ease}
.alert-box h2{margin:0 0 8px;color:#28a745}
@keyframes pop{from{transform:scale(0.7);opacity:0}to{transform:scale(1);opacity:1}}
</style>
</head>

<div class="alert-bg" id="alert">
  <div class="alert-box">
    <h2 id="alert-title"></h2>
  </div>
</div>

<script>

function showAlert(title) {
  document.getElementById("alert-title").innerText = title;
  document.getElementById("alert").style.display = "flex";
  setTimeout(() => {
    document.getElementById("alert").style.display = "none";
  }, 2000);
}

</script>









</body>
</html>
