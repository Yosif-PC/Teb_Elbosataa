<!doctype html>
<html lang="ar">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>طب البسطاء</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />


</head>
<body>

  <div id="loader">
  <div class="spinner"></div>
  <img src="Home_Logo.png" class="loader-logo">
  </div>
  <card>
    <row>

      <button class="B_ICON" style="width: 100%;font-size: large;" >طلب جديد</button> 
    </row>

  </card>
  <card>
    <row style="justify-content: start;">
      <button class="B_ICON"><span class="material-symbols-outlined">inactive_order</span></button>
      <input  id="invoice" readonly style="width: 30px;">
    </row>
  </card>
  <card>
    <row>
      <button class="B_ICON"><span class="material-symbols-outlined">person</span></button>
      <input id="Cl" readonly placeholder="العميل">
    </row>
    <row>
      <button class="B_ICON"><span class="material-symbols-outlined">location_on</span></button>
      <input  id="Cl_Address" placeholder="العنوان">
    </row>
    <row>
      <button class="B_ICON"><span class="material-symbols-outlined">phone_in_talk</span></button>
      <input  id="Cl_Phone" type="number" placeholder="رقم الهاتف">

    </row>
  </card>
  <card>

    <row>
      <button class="B_ICON"><span class="material-symbols-outlined">production_quantity_limits</span></button>
      <input id="D1" readonly placeholder="الصنف">  
    </row>
    <row>
      <button class="B_ICON"><span class="material-symbols-outlined">balance</span></button>
      <input type="number" id="D2" placeholder="الكمية">
      <button class="B_ICON"><span class="material-symbols-outlined">payments</span></button>
      <input type="number" id="D3" placeholder="السعر">
      <button class="B_ICON" onclick="addToTable()"><span class="material-symbols-outlined">Add</span></button>
    </row> 

    <row>   
    <table id="resultsTable">
    <thead>
      <tr>
        <th>الصنف</th>
        <th>الكمية</th>
        <th>السعر</th>
        <th>الإجمالى</th>
        <th></th>
      </tr>
    </thead>
    
    <tbody>
    </tbody>
  </table>
  </row>
</card> 
<card>
  <row>
      <button class="B_ICON"><span class="material-symbols-outlined">delivery_truck_bolt</span></button>
      <input type="number" id="D5"  placeholder="التوصيل">
      <button class="B_ICON"><span class="material-symbols-outlined">percent_discount</span></button>
      <input type="number" id="D6" placeholder="الخصم">
    </row>
</card>
<card>
    <row>
    <table id="resultsTable2">
    <thead>
      <tr>
        <th>ثمن الأصناف</th>
        <th>التوصيل</th>
        <th>الخصم</th>
        <th>المطلوب</th>
      </tr>
    </thead>
    
    <tbody>
    </tbody>
  </table>
  </row>
</card>

 
  <card>
  <row>
      <button class="B_ICON" style="width: 100%; font-size: large;" onclick="sendData()" >حفظ</button>
    </row>
</card>



<div id="loadingOverlay" style="
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    z-index:9999;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:1.5em;
">
    برجاء الإنتظار...
</div>



<!-- Popup للـ Clients_List (مرتبط بالـ input id CL) -->
<div id="popup_CL" class="popup" hidden="true">
  <div class="popup-content" role="dialog" aria-labelledby="title_CL">
    <h3 id="title_CL">قائمة العملاء</h3>

    <input type="text" id="search_CL" class="search-box" placeholder="ابحث عن اسم العميل..." oninput="filterList('popup_CL', this.value)">

    <div class="popup-list" id="list_CL">
      <!-- سيتم ملؤه تلقائيًا بواسطة JS -->
    </div>

    <div id="no_CL" class="no-results" style="display:none;">لا توجد نتائج</div>
  </div>
</div>

<!-- Popup للـ Products_List (مرتبط بالـ input id D1) -->
<div id="popup_D1" class="popup" hidden="true">
  <div class="popup-content" role="dialog" aria-labelledby="title_D1">
    <h3 id="title_D1">قائمة المنتجات</h3>

    <input type="text" id="search_D1" class="search-box" placeholder="ابحث عن المنتج..." oninput="filterList('popup_D1', this.value)">

    <div class="popup-list" id="list_D1">
    </div>

    <div id="no_D1" class="no-results" style="display:none;">لا توجد نتائج</div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="FireBase.js"></script>
<script src="New_Order_js.js"></script>


<head>
<meta charset="UTF-8">
<title>3 رسائل</title>
<style>
.alert-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);justify-content:center;align-items:center}
.alert-box{background:#fff;padding:10px;border-radius:20px;text-align:center;width:300px;animation:pop 0.3s ease}
.alert-box h2{margin:0 0 8px;color:#28a745}
@keyframes pop{from{transform:scale(0.7);opacity:0}to{transform:scale(1);opacity:1}}
</style>
</head>

<div class="alert-bg" id="alert">
  <div class="alert-box">
    <h2 id="alert-title"></h2>
  </div>
</div>

<script>

function showAlert(title) {
  document.getElementById("alert-title").innerText = title;
  document.getElementById("alert").style.display = "flex";
  setTimeout(() => {
    document.getElementById("alert").style.display = "none";
  }, 2000);
}

</script>
<script src="version.js"></script>






</body>
</html>
