<!doctype html>
<html lang="ar">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>طب البسطاء</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />


</head>
<body>
  <card>
    <row>

      <button class="B_ICON" style="width: 100%;font-size: large;" >الصفحة الرئيسية</button> 
    </row>

  </card>

  <card>
    <row style="justify-content: start; gap: 10px;">
      <button class="B_ICON"><span class="material-symbols-outlined">inactive_order</span></button> 
      <label id="H1">إجمالي الطلبات : </label>
    </row>
  </card>
  <card>
    <row style="justify-content: start; gap: 10px;">
      <button class="B_ICON"><span class="material-symbols-outlined">add_task</span></button> 
      <label id="H2">طلبات جديدة : </label>
    </row>
  </card>
  <card>
    <row style="justify-content: start; gap: 10px;">
      <button class="B_ICON"><span class="material-symbols-outlined">timer</span></button> 
      <label id="H3"> في إنتظار العميل : </label>
    </row>
  </card>
  <card>
    <row style="justify-content: start; gap: 10px;">
      <button class="B_ICON"><span class="material-symbols-outlined">chef_hat</span></button> 
      <label id="H4"> في إنتظار التحضير : </label>
    </row>
  </card>

  <card>
    <row style="justify-content: start; gap: 10px;">
      <button class="B_ICON"><span class="material-symbols-outlined">delivery_truck_speed</span></button> 
      <label id="H5"> في إنتظار التوصيل : </label>
    </row>
  </card>

  <card>
    <row style="justify-content: start; gap: 10px;">
      <button class="B_ICON"><span class="material-symbols-outlined">all_inbox</span></button> 
      <label id="H6">الأرشيف : </label>
    </row>
  </card>

  <card>
    <row style="justify-content: start; gap: 10px;">
      <button class="B_ICON"><span class="material-symbols-outlined">group</span></button> 
      <label id="H7">عدد العملاء : </label>
    </row>
  </card>


  <card>
    <row style="justify-content: start; gap: 10px;">
      <button class="B_ICON"><span class="material-symbols-outlined">calendar_meal</span></button> 
      <label id="H8">عدد الأصناف : </label>
    </row>
  </card>
  
  
</body>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="FireBase.js"></script>
<script src="Main_js.js"></script>
<script src="version.js"></script>


</html>
