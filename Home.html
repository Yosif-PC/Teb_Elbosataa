<!doctype html>
<html lang="ar">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>طب البسطاء</title>
  <link rel="stylesheet" href="Nstyle.css">
  <link rel="stylesheet" href="style.css">
  <link href='https://unpkg.com/boxicons@2.1.2/css/boxicons.min.css' rel='stylesheet'>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

</head>
<body style="padding:0px; overflow: hidden;">

  <iframe id="Main" src="Main.html" class="active"></iframe>
    <iframe id="New_Order" src="New_Order.html"></iframe>
    <iframe id="Accept_Orders" src="Accept_Orders.html"></iframe>
    <iframe id="Pended_Orders" src="Pended_Orders.html"></iframe>
    <iframe id="Cook_Orders" src="Cook_Orders.html"></iframe>
    <iframe id="Delivary_Orders" src="Delivary_Orders.html"></iframe>
    <iframe id="Archive_Orders" src="Archive_Orders.html"></iframe>
    <iframe id="Clients" src="Clients.html"></iframe>
    <iframe id="Products" src="Products.html"></iframe>
  <div class="bottom-bar">
    
  <button class="nav-btn active" onclick="setActive(this, 'Main')"><span class="material-symbols-outlined">Home</span></button>
  <button class="nav-btn" onclick="setActive(this, 'New_Order')"><span class="material-symbols-outlined">add_notes</span></button>
  <button class="nav-btn" onclick="setActive(this, 'Accept_Orders')"><span class="material-symbols-outlined">add_task</span></button>
  <button class="nav-btn" onclick="setActive(this, 'Pended_Orders')"><span class="material-symbols-outlined">timer</span></button>
  <button class="nav-btn" onclick="setActive(this, 'Cook_Orders')"><span class="material-symbols-outlined">chef_hat</span></button>
  <button class="nav-btn" onclick="setActive(this, 'Delivary_Orders')"><span class="material-symbols-outlined">delivery_truck_speed</span></button>
  <button class="nav-btn" onclick="setActive(this, 'Archive_Orders')"><span class="material-symbols-outlined">all_inbox</span></button>
  <button class="nav-btn" onclick="setActive(this, 'Clients')"><span class="material-symbols-outlined">group</span></button>
  <button class="nav-btn" onclick="setActive(this, 'Products')"><span class="material-symbols-outlined">calendar_meal</span></button>
  </div>
  
  
  <script>
function setActive(btn, pageId) {
  // إخفاء كل الـ iframes
  const iframes = document.querySelectorAll("iframe");
  iframes.forEach(frame => {
    frame.classList.remove("active");
  });

  // إظهار الصفحة المطلوبة
  document.getElementById(pageId).classList.add("active");

  // إزالة active من كل الأزرار
  const buttons = document.querySelectorAll(".nav-btn");
  buttons.forEach(b => {
    b.classList.remove("active");
  });

  // تفعيل الزر الحالي
  btn.classList.add("active");
}
  </script> 
  
</body>

<script src="version.js"></script>

</html>
